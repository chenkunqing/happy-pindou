<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>快乐拼豆</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  :root {
    --R: #FF4B4B; --G: #4BCB4B; --B: #4B7BFF; --Y: #FFDD4B; --P: #D54BFF;
    --bg: #1a1a2e; --panel: #16213e; --panel2: #0f3460;
    --text: #e8e8e8; --accent: #e94560; --muted: #8899aa;
  }
  body {
    background: var(--bg); color: var(--text);
    font-family: -apple-system, system-ui, sans-serif;
    min-height: 100dvh;
    display: flex; flex-direction: column; align-items: center;
    overflow-x: hidden; padding: 0 0 120px;
  }
  header {
    width: 100%; max-width: 480px;
    display: flex; justify-content: space-between; align-items: center;
    padding: 16px 20px 8px;
  }
  header .title { font-size: 18px; font-weight: 700; color: var(--accent); }
  header .info { font-size: 13px; color: var(--muted); }

  /* 目标预览条 */
  .target-bar {
    margin: 4px 16px 0; padding: 8px 12px;
    background: var(--panel); border-radius: 10px;
    width: calc(100% - 32px); max-width: 440px;
  }
  .target-bar-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px;
  }
  .target-bar-header span { font-size: 12px; color: var(--muted); }
  .btn-hint {
    font-size: 12px; padding: 4px 10px;
    border: 1px solid rgba(255,255,255,0.2); border-radius: 8px;
    background: transparent; color: var(--muted); cursor: pointer; transition: all 0.15s;
  }
  .btn-hint:hover, .btn-hint.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  .target-row { display: flex; gap: 4px; flex-wrap: wrap; }
  .target-cell {
    width: 36px; height: 36px; border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700;
    border: 2px solid rgba(255,255,255,0.1); transition: opacity 0.2s;
  }
  .target-cell.dim { opacity: 0.15; }

  .board-wrap {
    padding: 10px; background: var(--panel); border-radius: 16px;
    margin: 10px 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.4);
    width: calc(100% - 32px); max-width: 440px;
  }
  #board { display: grid; gap: 4px; width: 100%; aspect-ratio: 1; }

  /* 棋盘格子 */
  .cell {
    border-radius: 8px; position: relative;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; overflow: visible;
    transition: transform 0.1s;
  }
  .cell:active { transform: scale(0.95); }

  /* 底色 = 目标颜色，薄薄一层 */
  .floor {
    position: absolute; inset: 0; border-radius: 8px;
    opacity: 0.22; transition: opacity 0.2s; z-index: 0;
  }

  /* 棋子圆点 */
  .dot {
    width: 72%; height: 72%; border-radius: 50%;
    position: relative; z-index: 1;
    border: 2px solid rgba(255,255,255,0.5);
    box-shadow: inset -2px -2px 5px rgba(0,0,0,0.35), inset 1px 1px 3px rgba(255,255,255,0.2);
    transition: transform 0.15s, opacity 0.2s;
  }

  /* 高亮连通域 */
  .cell.highlighted .dot {
    transform: scale(1.1);
    box-shadow: 0 0 0 3px #FFE066, 0 0 14px #FFE066aa,
                inset -2px -2px 5px rgba(0,0,0,0.35), inset 1px 1px 3px rgba(255,255,255,0.2);
    animation: pulse-highlight 0.6s ease infinite alternate;
  }
  @keyframes pulse-highlight {
    from { box-shadow: 0 0 0 3px #FFE066, 0 0 10px #FFE06688, inset -2px -2px 5px rgba(0,0,0,0.35); }
    to   { box-shadow: 0 0 0 4px #FFE066, 0 0 18px #FFE066cc, inset -2px -2px 5px rgba(0,0,0,0.35); }
  }

  /* 已在正确位置（棋子=底色） */
  .cell.correct .dot {
    box-shadow: 0 0 0 2px #fff, 0 0 8px rgba(255,255,255,0.5),
                inset -2px -2px 5px rgba(0,0,0,0.3);
  }
  .cell.correct .floor { opacity: 0.38; }

  /* 锁定格 */
  .cell.locked { cursor: default; }
  .cell.locked .floor { opacity: 0.15; }
  .cell.locked .dot {
    border-color: rgba(255,255,255,0.8);
    box-shadow: 0 0 10px rgba(255,255,255,0.9), 0 0 3px #fff,
                inset -2px -2px 5px rgba(0,0,0,0.3), inset 1px 1px 3px rgba(255,255,255,0.3);
    animation: locked-glow 1.5s ease infinite alternate;
  }
  @keyframes locked-glow {
    from { box-shadow: 0 0 8px rgba(255,255,255,0.7), 0 0 2px #fff, inset -2px -2px 5px rgba(0,0,0,0.3); }
    to   { box-shadow: 0 0 14px rgba(255,255,255,1), 0 0 4px #fff, inset -2px -2px 5px rgba(0,0,0,0.3); }
  }
  .cell.locked::after {
    content: '🔒'; position: absolute; font-size: calc(min(3.5vw, 10px));
    top: 1px; right: 2px; z-index: 3;
    filter: drop-shadow(0 0 2px #fff);
  }

  /* 已被取走（棋子在缓冲区） */
  .cell.in-buffer { cursor: default; }
  .cell.in-buffer .floor { opacity: 0.12; }
  .cell.in-buffer .dot { opacity: 0.18; border-style: dashed; border-color: rgba(255,255,255,0.3); }
  .cell.in-buffer::before {
    content: ''; position: absolute; inset: 4px;
    border: 2px dashed rgba(255,255,255,0.2); border-radius: 50%; z-index: 2;
  }

  /* 吸附失败抖动 */
  @keyframes shake { 0%,100%{transform:translateX(0)} 20%{transform:translateX(-5px)} 60%{transform:translateX(5px)} }
  .cell.no-drop { animation: shake 0.3s; }
  .cell.no-drop .dot { border-color: #ff4444 !important; box-shadow: 0 0 0 3px #ff4444 !important; }

  /* 吸附成功飞入动画 */
  @keyframes absorb { 0%{transform:scale(1)} 40%{transform:scale(1.3)} 100%{transform:scale(0);opacity:0} }
  .cell.absorbing .dot { animation: absorb 0.3s ease forwards; }

  /* 归位弹出动画 */
  @keyframes lock-bounce { 0%{transform:scale(0)} 60%{transform:scale(1.2)} 80%{transform:scale(0.95)} 100%{transform:scale(1)} }
  .cell.lock-bounce .dot { animation: lock-bounce 0.35s ease; }

  /* 缓冲区 */
  .buffer-wrap {
    margin: 10px 16px; padding: 12px 16px;
    background: var(--panel); border-radius: 12px;
    width: calc(100% - 32px); max-width: 440px;
  }
  .buffer-label { font-size: 12px; color: var(--muted); margin-bottom: 8px; display: flex; justify-content: space-between; }
  #buffer { display: flex; gap: 8px; flex-wrap: wrap; }
  .buf-slot {
    min-width: 56px; height: 56px; border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.12); display: flex; flex-direction: column;
    align-items: center; justify-content: center; cursor: pointer; position: relative;
    background: rgba(255,255,255,0.04); padding: 4px 6px; gap: 2px;
    transition: all 0.15s;
  }
  .buf-slot.empty { border-style: dashed; opacity: 0.3; cursor: default; }
  .buf-slot.full:hover { transform: scale(1.07); box-shadow: 0 4px 14px rgba(0,0,0,0.5); }
  .buf-slot.full:active { transform: scale(0.97); }
  .buf-slot .dot {
    width: 34px; height: 34px; border-radius: 50%; border: 2px solid rgba(255,255,255,0.5);
    box-shadow: inset -2px -2px 5px rgba(0,0,0,0.35), inset 1px 1px 3px rgba(255,255,255,0.2);
    flex-shrink: 0;
  }
  .buf-slot .count { font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.85); line-height: 1; }
  @keyframes pulse-red { 0%,100%{border-color:rgba(255,255,255,0.12)} 50%{border-color:#ff4444} }
  .buf-slot.cannot { animation: pulse-red 0.4s; }

  /* 底部按钮 */
  .controls { margin: 14px 16px; display: flex; gap: 10px; width: calc(100% - 32px); max-width: 440px; }
  .btn { flex: 1; padding: 12px; border: none; border-radius: 10px; font-size: 15px; font-weight: 600; cursor: pointer; color: #fff; transition: all 0.15s; }
  .btn:active { transform: scale(0.97); }
  .btn-home { background: var(--panel2); }
  .btn-undo { background: var(--accent); }
  .btn-undo:disabled { opacity: 0.4; cursor: default; }
  .btn-restart { background: #4B7BFF; }

  /* 提示文字 */
  .hint-text { font-size: 12px; color: var(--muted); text-align: center; margin: 6px 0 10px; }

  /* Toast */
  .toast {
    position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.85); color: #fff; padding: 10px 24px; border-radius: 24px;
    font-size: 14px; font-weight: 600; pointer-events: none; z-index: 999;
    transition: opacity 0.3s; opacity: 0;
  }
  .toast.show { opacity: 1; }

  /* 通关弹窗 */
  #win-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; flex-direction: column; z-index: 1000; }
  #win-overlay.show { display: flex; }
  .win-card { background: var(--panel); border-radius: 20px; padding: 40px 36px; text-align: center; animation: win-pop 0.4s ease; }
  @keyframes win-pop { 0%{transform:scale(0.5);opacity:0} 70%{transform:scale(1.05)} 100%{transform:scale(1);opacity:1} }
  #win-overlay h2 { font-size: 28px; color: #FFE066; margin-bottom: 8px; }
  #win-overlay p { color: var(--muted); font-size: 15px; margin-bottom: 24px; }
  #win-overlay .btn { width: 100%; background: var(--accent); margin-top: 8px; }

  /* 关卡选择 */
  .level-selector { display: flex; gap: 8px; margin: 4px 16px 0; width: calc(100% - 32px); max-width: 440px; overflow-x: auto; padding-bottom: 4px; }
  .level-tab { padding: 6px 14px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.15); background: var(--panel); color: var(--muted); font-size: 13px; cursor: pointer; white-space: nowrap; transition: all 0.15s; }
  .level-tab.active { background: var(--accent); color: #fff; border-color: var(--accent); }
</style>
</head>
<body>

<header>
  <div class="title">🧩 快乐拼豆</div>
  <div class="info" id="stepInfo">步数: 0</div>
</header>

<div class="target-bar">
  <div class="target-bar-header">
    <span>🎯 目标布局</span>
    <button class="btn-hint active" id="hintBtn" onclick="toggleHint()">隐藏</button>
  </div>
  <div class="target-row" id="targetRow"></div>
</div>

<div class="level-selector" id="levelTabs"></div>
<p class="hint-text">点击同色连通区域 → 再次点击吸附到暂存区 → 点暂存区归位</p>

<div class="board-wrap">
  <div id="board"></div>
</div>

<div class="buffer-wrap">
  <div class="buffer-label">
    <span>🗃 暂存区</span>
    <span id="bufCount">0/5</span>
  </div>
  <div id="buffer"></div>
</div>

<div class="controls">
  <button class="btn btn-restart" onclick="restartLevel()">🔄 重开</button>
  <button class="btn btn-undo" id="undoBtn" onclick="undo()" disabled>↩ 撤销</button>
</div>

<div id="win-overlay">
  <div class="win-card">
    <h2>🎉 通关！</h2>
    <p id="winMsg">太棒了！</p>
    <button class="btn btn-restart" onclick="nextLevel()">下一关 →</button>
    <button class="btn btn-home" onclick="closeWin()">再玩一次</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ============ 关卡数据 ============
const LEVELS = [
  {
    id: 1, name: "第1关 5×5",
    size: 5, bufferCapacity: 5,
    board: [
      ["R","R","G","B","B"],
      ["R","G","G","B","Y"],
      ["R","G","Y","B","Y"],
      ["G","G","Y","B","Y"],
      ["G","R","R","B","Y"]
    ],
    target: [
      ["R","R","R","R","R"],
      ["R","R","R","R","R"],
      ["G","G","G","G","G"],
      ["G","G","G","G","G"],
      ["B","B","B","B","Y"]
    ]
  },
  {
    id: 2, name: "第2关 5×5",
    size: 5, bufferCapacity: 5,
    board: [
      ["B","B","Y","G","R"],
      ["B","Y","Y","G","R"],
      ["G","G","Y","G","R"],
      ["B","Y","G","G","R"],
      ["Y","Y","B","R","R"]
    ],
    target: [
      ["B","B","B","B","B"],
      ["G","G","G","G","G"],
      ["Y","Y","Y","Y","Y"],
      ["R","R","R","R","R"],
      ["R","R","R","R","R"]
    ]
  },
  {
    id: 3, name: "第3关 6×6",
    size: 6, bufferCapacity: 6,
    board: [
      ["R","G","B","Y","P","R"],
      ["G","R","G","B","Y","G"],
      ["B","B","R","G","B","Y"],
      ["Y","G","B","Y","P","R"],
      ["P","Y","G","R","G","B"],
      ["R","P","Y","B","R","P"]
    ],
    target: [
      ["R","R","R","R","R","R"],
      ["G","G","G","G","G","G"],
      ["B","B","B","B","B","B"],
      ["Y","Y","Y","Y","Y","Y"],
      ["P","P","P","P","P","P"],
      ["P","P","P","P","P","P"]
    ]
  }
];

const COLORS = { R:'#FF4B4B', G:'#4BCB4B', B:'#4B7BFF', Y:'#FFDD4B', P:'#D54BFF' };
const EMOJI  = { R:'🔴', G:'🟢', B:'🔵', Y:'🟡', P:'🟣' };

// ============ 游戏状态 ============
let state = {
  size: 5, bufferCap: 5,
  board: [], target: [], buffer: [],
  history: [], steps: 0,
  currentLevel: 0, highlighted: [], won: false,
  showHint: true
};

// ============ BFS 连通域 ============
function bfs(startR, startC) {
  const color = state.board[startR][startC].color;
  const visited = new Set();
  const queue = [[startR, startC]];
  const result = [];
  visited.add(`${startR},${startC}`);
  while (queue.length) {
    const [r, c] = queue.shift();
    const cell = state.board[r][c];
    if (cell.locked || cell.inBuffer) continue;
    if (cell.color !== color) continue;
    result.push([r, c]);
    for (const [dr, dc] of [[-1,0],[1,0],[0,-1],[0,1]]) {
      const nr = r+dr, nc = c+dc;
      if (nr<0||nr>=state.size||nc<0||nc>=state.size) continue;
      const key = `${nr},${nc}`;
      if (!visited.has(key)) { visited.add(key); queue.push([nr,nc]); }
    }
  }
  return result;
}

// ============ 初始化 ============
function loadLevel(idx) {
  const lvl = LEVELS[idx];
  state = {
    size: lvl.size, bufferCap: lvl.bufferCapacity,
    board: [], target: [], buffer: [],
    history: [], steps: 0,
    currentLevel: idx, highlighted: [], won: false,
    showHint: state.showHint
  };
  for (let r=0; r<lvl.size; r++) {
    state.board[r] = []; state.target[r] = [];
    for (let c=0; c<lvl.size; c++) {
      state.board[r][c] = { color: lvl.board[r][c], locked: false, inBuffer: false };
      state.target[r][c] = lvl.target[r][c];
    }
  }
  state.buffer = Array.from({ length: lvl.bufferCapacity }, () => null);
  renderAll();
  buildLevelTabs();
}

function restartLevel() { loadLevel(state.currentLevel); }
function nextLevel() {
  closeWin();
  loadLevel((state.currentLevel + 1) % LEVELS.length);
}
function closeWin() {
  document.getElementById('win-overlay').classList.remove('show');
}

function buildLevelTabs() {
  const el = document.getElementById('levelTabs');
  el.innerHTML = '';
  LEVELS.forEach((lvl, i) => {
    const btn = document.createElement('button');
    btn.className = 'level-tab' + (i===state.currentLevel?' active':'');
    btn.textContent = lvl.name;
    btn.onclick = () => loadLevel(i);
    el.appendChild(btn);
  });
}

// ============ 渲染 ============
function renderAll() {
  renderTargetBar();
  renderBoard();
  renderBuffer();
  document.getElementById('stepInfo').textContent = `步数: ${state.steps}`;
  document.getElementById('bufCount').textContent = `${bufferUsed()}/${state.bufferCap}`;
  document.getElementById('undoBtn').disabled = state.history.length === 0;
}

function renderTargetBar() {
  const el = document.getElementById('targetRow');
  const btn = document.getElementById('hintBtn');
  btn.textContent = state.showHint ? '隐藏' : '显示';
  btn.classList.toggle('active', state.showHint);
  el.innerHTML = '';
  for (let r=0; r<state.size; r++)
    for (let c=0; c<state.size; c++) {
      const tc = document.createElement('div');
      tc.className = 'target-cell' + (state.showHint ? '' : ' dim');
      const tgt = state.target[r][c];
      tc.style.background = COLORS[tgt];
      tc.textContent = EMOJI[tgt];
      el.appendChild(tc);
    }
}

function toggleHint() {
  state.showHint = !state.showHint;
  renderTargetBar();
}

function renderBoard() {
  const board = document.getElementById('board');
  board.style.gridTemplateColumns = `repeat(${state.size}, 1fr)`;
  board.innerHTML = '';

  for (let r=0; r<state.size; r++) {
    for (let c=0; c<state.size; c++) {
      const info = state.board[r][c];
      const cell = document.createElement('div');
      cell.className = 'cell';
      cell.dataset.r = r; cell.dataset.c = c;

      // 底色
      const floor = document.createElement('div');
      floor.className = 'floor';
      floor.style.background = COLORS[state.target[r][c]];

      // 棋子
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.background = COLORS[info.color];

      if (info.locked) {
        cell.classList.add('locked');
        cell.appendChild(floor); cell.appendChild(dot);
      } else if (info.inBuffer) {
        cell.classList.add('in-buffer');
        cell.appendChild(floor); cell.appendChild(dot);
      } else {
        // 可操作格
        if (info.color === state.target[r][c]) cell.classList.add('correct');
        cell.appendChild(floor); cell.appendChild(dot);
        cell.addEventListener('click', () => onBoardClick(r, c));
        cell.addEventListener('touchstart', e => { e.preventDefault(); onBoardClick(r, c); }, { passive: false });
      }

      if (state.highlighted.some(([hr,hc])=>hr===r&&hc===c)) {
        cell.classList.add('highlighted');
      }

      board.appendChild(cell);
    }
  }
}

function renderBuffer() {
  const el = document.getElementById('buffer');
  el.innerHTML = '';
  state.buffer.forEach((slot, i) => {
    const div = document.createElement('div');
    div.className = 'buf-slot' + (slot ? ' full' : ' empty');
    if (slot) {
      const dot = document.createElement('div');
      dot.className = 'dot';
      dot.style.background = COLORS[slot.color];
      const cnt = document.createElement('span');
      cnt.className = 'count';
      cnt.textContent = '×'+slot.count;
      div.appendChild(dot); div.appendChild(cnt);
      div.title = `点击归位 ${EMOJI[slot.color]} ×${slot.count}`;
      div.addEventListener('click', () => onBufferClick(i));
      div.addEventListener('touchstart', e => { e.preventDefault(); onBufferClick(i); }, { passive: false });
    }
    el.appendChild(div);
  });
}

// ============ 交互 ============
function bufferUsed() { return state.buffer.reduce((s, x) => s + (x ? x.count : 0), 0); }
function bufferFree() { return state.bufferCap - bufferUsed(); }

function onBoardClick(r, c) {
  if (state.won) return;
  const info = state.board[r][c];
  if (info.locked || info.inBuffer) return;

  const domain = bfs(r, c);

  if (state.highlighted.length > 0) {
    // 再次点击 → 吸附
    if (domain.length <= bufferFree()) {
      absorbDomain(domain);
    } else {
      failDrop(domain);
    }
    state.highlighted = [];
    renderBoard();
  } else {
    // 第一次点击 → 高亮
    state.highlighted = domain;
    renderBoard();
  }
}

function absorbDomain(domain) {
  state.history.push({
    board: JSON.parse(JSON.stringify(state.board.map(row=>row.map(x=>({...x}))))),
    buffer: state.buffer.map(x=>x?{...x}:null),
    steps: state.steps
  });

  const color = state.board[domain[0][0]][domain[0][1]].color;

  // 动画：飞走
  domain.forEach(([r,c]) => {
    const idx = r*state.size + c;
    const cell = document.querySelectorAll('.cell')[idx];
    if (cell) cell.classList.add('absorbing');
  });

  setTimeout(() => {
    domain.forEach(([r,c]) => { state.board[r][c].inBuffer = true; });

    const exist = state.buffer.findIndex(s=>s&&s.color===color);
    if (exist >= 0) {
      state.buffer[exist].count += domain.length;
    } else {
      const empty = state.buffer.findIndex(s=>s===null);
      if (empty >= 0) state.buffer[empty] = { color, count: domain.length };
    }

    state.steps++;
    renderAll();
  }, 280);
}

function failDrop(domain) {
  domain.forEach(([r,c]) => {
    const idx = r*state.size + c;
    const cell = document.querySelectorAll('.cell')[idx];
    if (cell) {
      cell.classList.add('no-drop');
      setTimeout(()=>cell.classList.remove('no-drop'), 400);
    }
  });
  showToast('暂存区空间不足！整组禁止放入');
}

function onBufferClick(slotIdx) {
  if (state.won) return;
  const slot = state.buffer[slotIdx];
  if (!slot) return;

  // 找目标格：未锁定、未在缓冲区、且 target = 该颜色
  const targets = [];
  for (let r=0; r<state.size; r++)
    for (let c=0; c<state.size; c++) {
      const info = state.board[r][c];
      if (!info.locked && !info.inBuffer && state.target[r][c] === slot.color) {
        targets.push([r,c]);
      }
    }

  if (targets.length === 0) {
    const el = document.querySelectorAll('.buf-slot')[slotIdx];
    el.classList.add('cannot');
    setTimeout(()=>el.classList.remove('cannot'), 500);
    showToast(`没有 ${EMOJI[slot.color]} 的目标位置！`);
    return;
  }

  state.history.push({
    board: JSON.parse(JSON.stringify(state.board.map(row=>row.map(x=>({...x}))))),
    buffer: state.buffer.map(x=>x?{...x}:null),
    steps: state.steps
  });

  const count = Math.min(slot.count, targets.length);
  // 归位动画
  targets.slice(0, count).forEach(([r,c], i) => {
    const idx = r*state.size + c;
    setTimeout(() => {
      const cell = document.querySelectorAll('.cell')[idx];
      if (cell) cell.classList.add('lock-bounce');
    }, i * 60);
  });

  setTimeout(() => {
    for (let i=0; i<count; i++) {
      const [tr,tc] = targets[i];
      state.board[tr][tc].inBuffer = false;
      state.board[tr][tc].locked = true;
    }
    const remain = slot.count - count;
    state.buffer[slotIdx] = remain > 0 ? { color: slot.color, count: remain } : null;
    state.steps++;
    renderAll();
    checkWin();
  }, count * 60 + 100);
}

function checkWin() {
  for (let r=0; r<state.size; r++)
    for (let c=0; c<state.size; c++)
      if (!state.board[r][c].locked) return;

  state.won = true;
  setTimeout(() => {
    document.getElementById('winMsg').textContent = `用了 ${state.steps} 步完成！`;
    document.getElementById('win-overlay').classList.add('show');
    // 全屏闪光
    document.body.style.transition = 'filter 0.3s';
    document.body.style.filter = 'brightness(2)';
    setTimeout(() => { document.body.style.filter = ''; }, 400);
  }, 350);
}

function undo() {
  if (!state.history.length) return;
  const prev = state.history.pop();
  state.board = prev.board;
  state.buffer = prev.buffer;
  state.steps = prev.steps;
  state.highlighted = [];
  renderAll();
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'), 2000);
}

// ============ 启动 ============
loadLevel(0);
</script>
